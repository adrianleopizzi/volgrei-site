name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */4 * *'  # ogni 4 giorni alle 9:00
  workflow_dispatch:  # eseguibile manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s https://knhizvvyzxbicccbodki.supabase.co/rest/v1/ \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"